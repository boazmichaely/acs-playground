<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ACS demo setup</title>
  <link rel="icon" type="image/png" href="__ACS_GUI_FAVICON_DATA_URI__" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@patternfly/patternfly@5.4.2/patternfly.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@patternfly/patternfly@5.4.2/patternfly-addons.css" />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=unfold_more"
  />
  <link rel="stylesheet" href="/demo-setup.css" />
</head>
<body>
  <div class="pf-v5-c-page">
    <main class="pf-v5-c-page__main" tabindex="-1">
      <header class="pf-v5-c-page__main-section demo-page-header">
        <h1 class="pf-v5-c-title pf-m-4xl demo-page-title">ACS demo setup</h1>
      </header>

      <div class="demo-pad">
        <details class="cred-panel">
          <summary class="cred-panel__toggle">
            <span class="cred-panel__chev" aria-hidden="true"></span>
            <span class="cred-panel__title">Central credentials</span>
          </summary>
          <div class="cred-panel__body">
            <div class="pf-v5-c-card">
              <div class="pf-v5-c-card__body pf-m-pt-sm">
                <div class="cred-actions-row">
                  <span id="credSaveFeedback" class="cred-save-feedback" aria-live="polite"></span>
                  <button class="pf-v5-c-button pf-m-primary" type="button" id="btnCredSave">Save</button>
                </div>
                <p class="pf-v5-c-helper-text cred-path-line">
                  <span class="cred-path-label">File:</span>
                  <code id="credFilePath" class="cred-file-path">—</code>
                </p>
                <form id="credForm" class="cred-form" autocomplete="off">
                  <div class="pf-v5-c-form">
                    <div class="pf-v5-c-form__group">
                      <label class="pf-v5-c-form__label" for="credCentralEndpoint">Central endpoint</label>
                      <input
                        class="pf-v5-c-form-control"
                        type="text"
                        id="credCentralEndpoint"
                        name="centralEndpoint"
                        placeholder="https://central-stackrox.apps…"
                        spellcheck="false"
                      />
                    </div>
                    <div class="pf-v5-c-form__group">
                      <label class="pf-v5-c-form__label" for="credApiKey">API key</label>
                      <input class="pf-v5-c-form-control" type="text" id="credApiKey" name="apiKey" spellcheck="false" />
                    </div>
                    <div class="pf-v5-c-form__group">
                      <label class="pf-v5-c-form__label" for="credAdminUsername">Admin username</label>
                      <input class="pf-v5-c-form-control" type="text" id="credAdminUsername" name="adminUsername" spellcheck="false" />
                    </div>
                    <div class="pf-v5-c-form__group">
                      <label class="pf-v5-c-form__label" for="credAdminPassword">Admin password</label>
                      <input class="pf-v5-c-form-control" type="password" id="credAdminPassword" name="adminPassword" spellcheck="false" />
                    </div>
                    <div class="pf-v5-c-form__group">
                      <span class="pf-v5-c-form__label" id="credAuthPrefLabel">When both API key and password are set</span>
                      <fieldset class="cred-auth-pref" aria-labelledby="credAuthPrefLabel">
                        <label class="pf-v5-c-check">
                          <input
                            class="pf-v5-c-check__input"
                            type="radio"
                            name="authPreference"
                            value="apiKey"
                            checked
                          />
                          <span class="pf-v5-c-check__label">Use API key</span>
                        </label>
                        <label class="pf-v5-c-check">
                          <input class="pf-v5-c-check__input" type="radio" name="authPreference" value="password" />
                          <span class="pf-v5-c-check__label">Use admin password</span>
                        </label>
                      </fieldset>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </details>

        <div class="pf-v5-c-card pf-m-mt-lg">
          <div class="pf-v5-c-card__header">
            <div class="pf-v5-c-card__header-main">
              <div class="pf-v5-c-card__title">
                <h2 class="pf-v5-c-card__title-text pf-m-0">Modules</h2>
              </div>
            </div>
          </div>
          <div class="pf-v5-c-card__body pf-m-pt-0">
            <div class="bulk-toolbar" id="moduleBulkBar" aria-label="Module selection">
              <label class="pf-v5-c-check" for="modSelectAll">
                <input class="pf-v5-c-check__input" type="checkbox" id="modSelectAll" name="select-all-modules" />
                <span class="pf-v5-c-check__label">Select all</span>
              </label>
              <div class="bulk-toolbar__results">
                <span id="modSelectionCount" class="bulk-toolbar__count">0 of 0 selected</span>
              </div>
            </div>
            <div class="modules-table-scroll">
              <table
                class="pf-v5-c-table modules-table"
                role="grid"
                aria-label="Demo modules"
              >
                <thead class="pf-v5-c-table__thead">
                  <tr class="pf-v5-c-table__tr">
                    <th class="pf-v5-c-table__th modules-th-module" scope="col">Module</th>
                    <th class="pf-v5-c-table__th modules-th-status" scope="col">State · detail</th>
                  </tr>
                </thead>
                <tbody class="pf-v5-c-table__tbody" id="modulesTbody">
                  <tr class="pf-v5-c-table__tr">
                    <td class="pf-v5-c-table__td module-row-td" colspan="2">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="demo-actions-row">
              <button class="pf-v5-c-button pf-m-primary" type="button" id="btnRun">Run selected</button>
              <button
                class="pf-v5-c-button pf-m-secondary"
                type="button"
                id="btnRunFull"
                title="Full pipeline in script order: central → roxctl-env → secured-cluster → ms-demo → init-demo → registries → ocp-users → ocp-oauth → acs-users → slack-notifier → splunk"
              >
                Run full install
              </button>
            </div>
          </div>
        </div>

        <div class="pf-v5-c-card pf-m-mt-lg">
          <div class="pf-v5-c-card__header">
            <div class="pf-v5-c-card__header-main">
              <div class="pf-v5-c-card__title">
                <h2 class="pf-v5-c-card__title-text pf-m-0">Status</h2>
              </div>
            </div>
            <div class="pf-v5-c-card__actions demo-status-actions">
              <button class="pf-v5-c-button pf-m-secondary" type="button" id="btnStatus">
                Refresh status
              </button>
              <span id="statusRefreshIndicator" class="status-refresh-indicator" aria-live="polite"></span>
            </div>
          </div>
          <div class="pf-v5-c-card__body pf-m-pt-sm">
            <details id="statusOuter" class="status-panel" open>
              <summary class="status-panel__toggle">
                <span class="status-panel__chev" aria-hidden="true"></span>
                <button
                  type="button"
                  id="btnPreflightExpandAll"
                  class="status-panel__expand-all"
                  disabled
                  aria-label="Expand all sections"
                >
                  <span class="material-symbols-outlined status-panel__expand-all-ms" aria-hidden="true">unfold_more</span>
                </button>
                <span class="status-panel__title">Preflight</span>
              </summary>
              <div id="statusWrap" class="status-panel__body"></div>
            </details>
          </div>
        </div>

        <div class="pf-v5-c-card pf-m-mt-lg">
          <div class="pf-v5-c-card__header">
            <div class="pf-v5-c-card__header-main">
              <div class="pf-v5-c-card__title">
                <h2 class="pf-v5-c-card__title-text pf-m-0">Log</h2>
              </div>
            </div>
          </div>
          <div class="pf-v5-c-card__body">
            <div id="log" class="demo-log" role="log" aria-label="Script output"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
