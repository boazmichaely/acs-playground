# Minimal RHACS Central CR — mirrors a default "Create Central" in the OpenShift console
# Prerequisite: RHACS operator already installed from Operator Lifecycle Manager (catalog).
#
# Apply:
#   oc new-project stackrox --skip-config-write=false 2>/dev/null || oc project stackrox
#   oc apply -f central-cr-minimal.yaml
#
apiVersion: platform.stackrox.io/v1alpha1
kind: Central
metadata:
  name: stackrox-central-services
  namespace: stackrox
spec:
  central:
    exposure:
      route:
        enabled: true
