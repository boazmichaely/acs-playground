# Minimal RHACS SecuredCluster CR — OpenShift Operator, same cluster as Central
#
# SIMPLIFIED LAB DEFAULT (this file):
#   Central and Secured Cluster both run on THIS OpenShift cluster, resources in
#   namespace `stackrox`. Leave `centralEndpoint` unset so Sensor connects to Central
#   in the same namespace (operator default).
#
# DIFFERENT CLUSTER (not this simplified flow):
#   Install SecuredCluster on another cluster’s `stackrox` project and set:
#     spec.centralEndpoint: "<public Central URL including port, e.g. central-…:443>"
#   Use `oc explain securedcluster.spec.centralEndpoint` for TLS / wss:// notes.
#   Init bundles / extra TLS material may apply — see RHACS versioned install docs.
#
# clusterName is REQUIRED and IMMUTABLE after creation — must match what you expect
# in ACS UI (Platform Configuration → Clusters). The script substitutes
# CLUSTER_NAME_PLACEHOLDER using ACS_SECURED_CLUSTER_NAME, SECURED_CLUSTER_NAME, or
# OpenShift infrastructure / MachineSet hints.
#
# This manifest does NOT use a separate “cluster registration secret” (CRS / init bundle):
# the Operator-driven SecuredCluster CR registers the cluster when reconciled.
#
apiVersion: platform.stackrox.io/v1alpha1
kind: SecuredCluster
metadata:
  name: stackrox-secured-cluster-services
  namespace: stackrox
spec:
  clusterName: CLUSTER_NAME_PLACEHOLDER
